<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>大冒險地圖</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #362112;
      --panel: rgba(255, 246, 216, 0.92);
      --gold: #d99d2f;
      --green: #39a85a;
      --red: #d84535;
      --blue: #3999d8;
      --line: rgba(121, 74, 30, 0.25);
      --shadow: 0 18px 48px rgba(68, 44, 18, 0.28);
    }

    * { box-sizing: border-box; }

    html, body { min-height: 100%; }

    body {
      margin: 0;
      overflow-x: hidden;
      font-family: "Microsoft JhengHei", "Noto Sans TC", system-ui, sans-serif;
      color: var(--ink);
      background: #f4dfaf;
    }

    button, a { font: inherit; }

    .cover {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: grid;
      place-items: center;
      background: #0d1220;
      cursor: pointer;
      opacity: 1;
      transition: opacity 700ms ease, visibility 700ms ease;
    }

    .cover.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .page {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 10px;
      padding: 12px;
      background:
        radial-gradient(circle at 18% 10%, rgba(255, 255, 255, 0.32), transparent 22rem),
        linear-gradient(135deg, #e8ca8a, #f6e7be 48%, #d9b775);
    }

    .top-info {
      position: fixed;
      top: 14px;
      right: 14px;
      z-index: 12;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border: 1px solid rgba(91, 55, 21, 0.22);
      border-radius: 999px;
      background: rgba(255, 248, 224, 0.88);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }

    .cert-count {
      min-width: 92px;
      color: #5a3917;
      font-weight: 900;
      text-align: center;
    }

    .clear-btn, .close-btn, .again-btn {
      min-height: 38px;
      border: 0;
      border-radius: 999px;
      padding: 8px 12px;
      background: linear-gradient(180deg, #ffe6a3, #d99d2f);
      color: #2d1c0d;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(82, 50, 18, 0.18);
    }

    .map-stage {
      min-height: calc(100vh - 24px);
      display: grid;
      place-items: center;
      padding: 56px 0 16px;
    }

    .map-wrap {
      position: relative;
      width: min(100%, calc((100vh - 96px) * 16 / 9));
      max-width: min(100%, 1600px);
      aspect-ratio: 16 / 9;
      display: grid;
      place-items: center;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 22px 60px rgba(87, 54, 20, 0.34);
      background: rgba(255, 248, 224, 0.30);
    }

    .map-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .hotspot {
      position: absolute;
      border-radius: 999px;
      cursor: pointer;
      outline: none;
      background: rgba(255, 255, 255, 0);
      transition: box-shadow 160ms ease, background 160ms ease, transform 160ms ease;
    }

    .hotspot:hover,
    .hotspot:focus-visible {
      background: rgba(255, 246, 190, 0.18);
      box-shadow: 0 0 22px rgba(255, 224, 118, 0.72), 0 0 44px rgba(255, 255, 255, 0.35);
      transform: scale(1.02);
    }

    .hot-dynasty { left: 10.8%; top: 37.5%; width: 24.7%; height: 9.6%; }
    .hot-idiom { left: 72.4%; top: 38.5%; width: 22.5%; height: 9.5%; }
    .hot-rpg { left: 10.6%; top: 84.4%; width: 22.8%; height: 10%; }
    .hot-door { left: 41.6%; top: 64.8%; width: 19.2%; height: 9.6%; }

    .stamp {
      position: absolute;
      z-index: 6;
      width: clamp(28px, 3.4vw, 48px);
      aspect-ratio: 1;
      display: none;
      place-items: center;
      border: 3px solid rgba(255,255,255,.78);
      border-radius: 50%;
      background: rgba(57, 168, 90, 0.94);
      color: #fff;
      font-size: clamp(1rem, 2.2vw, 1.65rem);
      font-weight: 1000;
      box-shadow: 0 8px 18px rgba(0,0,0,.22), 0 0 20px rgba(57,168,90,.35);
      pointer-events: none;
      transform: translate(-50%, -50%) rotate(-9deg);
    }

    .stamp.show { display: grid; }
    .stamp-dynasty { left: 34.1%; top: 38.0%; }
    .stamp-idiom { left: 92.4%; top: 39.0%; }
    .stamp-rpg { left: 30.6%; top: 85.0%; }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 18px;
      background: rgba(42, 24, 12, 0.42);
      backdrop-filter: blur(8px);
      z-index: 30;
    }

    .modal.show { display: grid; }

    .door-box {
      width: min(940px, 100%);
      max-height: min(92vh, 820px);
      overflow: auto;
      display: grid;
      gap: 18px;
      padding: 22px;
      border: 2px solid rgba(144, 86, 31, 0.28);
      border-radius: 24px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .door-head {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 12px;
    }

    h2, h3, p { margin: 0; }
    h2 { font-size: clamp(1.5rem, 4vw, 2.5rem); }
    .door-note { margin-top: 6px; color: #73542f; font-weight: 700; }

    .slots {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .slot {
      min-height: 145px;
      display: grid;
      place-items: center;
      gap: 8px;
      padding: 14px;
      border: 2px dashed rgba(144, 86, 31, 0.36);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.34);
      color: #80613a;
      transition: box-shadow 140ms ease, border-color 140ms ease, background 140ms ease;
    }

    .slot.over { border-color: var(--blue); box-shadow: 0 0 24px rgba(57,153,216,.20); }
    .slot.correct { border-style: solid; border-color: rgba(57,168,90,.82); background: rgba(57,168,90,.12); color: var(--green); }
    .slot.wrong { animation: wrong 300ms ease; }
    @keyframes wrong { 50% { border-color: var(--red); box-shadow: 0 0 28px rgba(216,69,53,.42); transform: translateX(6px); } }

    .slot-label { font-size: 1.12rem; font-weight: 900; }

    .bag {
      display: grid;
      gap: 10px;
      padding: 16px;
      border: 1px solid rgba(144, 86, 31, 0.22);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.32);
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      min-height: 78px;
    }

    .badge {
      min-width: 136px;
      min-height: 58px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 12px;
      border: 1px solid rgba(144, 86, 31, 0.22);
      border-radius: 999px;
      background: linear-gradient(180deg, #ffe6a3, #d99d2f);
      color: #2d1c0d;
      font-weight: 1000;
      cursor: grab;
      touch-action: none;
      box-shadow: 0 10px 22px rgba(82, 50, 18, 0.18);
      user-select: none;
    }

    .badge.placed {
      cursor: default;
      background: linear-gradient(180deg, #9df0b6, #39a85a);
      color: #12311b;
    }

    .empty-bag { color: #73542f; padding: 10px 0; font-weight: 700; }



    .story-panel {
      display: none;
      justify-items: center;
      gap: 14px;
      padding: clamp(16px, 3vw, 26px);
      border: 2px solid rgba(144, 86, 31, 0.30);
      border-radius: 24px;
      background:
        radial-gradient(circle at 18% 12%, rgba(255,255,255,.42), transparent 18rem),
        rgba(255, 248, 224, 0.82);
      box-shadow: var(--shadow), inset 0 0 36px rgba(121, 74, 30, 0.08);
      text-align: center;
      animation: storyIn 520ms ease both;
    }

    .story-panel.show { display: grid; }
    .story-panel.fade { animation: storyOut 520ms ease both; }

    @keyframes storyIn {
      from { opacity: 0; transform: translateY(12px) scale(.985); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes storyOut {
      from { opacity: 1; transform: translateY(0) scale(1); }
      to { opacity: 0; transform: translateY(-10px) scale(.985); }
    }

    .story-title {
      color: #5b3513;
      font-size: clamp(1.7rem, 5vw, 3rem);
      letter-spacing: .08em;
      text-shadow: 0 2px 0 rgba(255,255,255,.45);
    }

    .story-stage {
      width: min(100%, 760px);
      display: grid;
      gap: 10px;
    }

    .story-image-frame {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      border: 2px solid rgba(144, 86, 31, 0.28);
      border-radius: 18px;
      background: rgba(255,255,255,.35);
      box-shadow: 0 14px 32px rgba(82, 50, 18, 0.20);
    }

    .story-image-frame img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .story-act {
      color: #9b5f19;
      font-weight: 1000;
      font-size: 1.06rem;
    }

    .story-line {
      min-height: 72px;
      display: grid;
      place-items: center;
      padding: 14px 16px;
      border: 1px solid rgba(144, 86, 31, 0.20);
      border-radius: 16px;
      background: rgba(255,255,255,.38);
      color: #46301b;
      font-size: clamp(1rem, 2.4vw, 1.2rem);
      font-weight: 700;
      line-height: 1.75;
    }

    .story-next {
      min-height: 44px;
      border: 0;
      border-radius: 999px;
      padding: 9px 22px;
      background: linear-gradient(180deg, #ffe6a3, #d99d2f);
      color: #2d1c0d;
      font-weight: 1000;
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(82, 50, 18, 0.18);
    }

    .win {
      display: none;
      justify-items: center;
      gap: 14px;
      padding: 26px;
      border: 1px solid rgba(217,157,47,.42);
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.38);
      text-align: center;
    }

    .win.show { display: grid; }
    .win h2 { font-size: clamp(2rem, 6vw, 3.4rem); }
    .time { color: #a56d18; font-size: 1.45rem; font-weight: 1000; }

    .ghost {
      position: fixed;
      z-index: 999;
      pointer-events: none;
      transform: translate(-50%, -50%);
      opacity: .92;
    }

    @media (max-width: 820px) {
      .top-info { left: 12px; right: 12px; justify-content: space-between; }
      .map-stage { padding-top: 74px; }
      .map-wrap { width: min(100%, calc((100vh - 124px) * 16 / 9)); }
      .door-head { flex-direction: column; }
      .slots { grid-template-columns: 1fr; }
      .badges { overflow-x: auto; flex-wrap: nowrap; padding-bottom: 6px; }
      .badge { flex: 0 0 auto; }
    }
  </style>
</head>
<body>
  <section class="cover" id="cover" aria-label="遊戲開場封面">
    <img src="cover.png" alt="遊戲開場封面">
  </section>

  <main class="page">
    <div class="top-info">
      <div class="cert-count" id="certCount">持有 0 / 3</div>
      <button class="clear-btn" id="clearBtn">🔄 清除進度</button>
    </div>

    <section class="map-stage" aria-label="大冒險地圖">
      <div class="map-wrap">
        <img class="map-img" src="map-bg.png" alt="大冒險地圖">

        <a class="hotspot hot-dynasty" href="../示範1_朝代配對/index.html" aria-label="前往朝代配對"></a>
        <a class="hotspot hot-idiom" href="../示範2_成語填字/index.html" aria-label="前往成語填字"></a>
        <a class="hotspot hot-rpg" href="../示範3_打怪RPG/index.html" aria-label="前往打怪 RPG"></a>
        <button class="hotspot hot-door" id="doorHotspot" aria-label="打開通關大門"></button>

        <div class="stamp stamp-dynasty" id="stampDynasty">✓</div>
        <div class="stamp stamp-idiom" id="stampIdiom">✓</div>
        <div class="stamp stamp-rpg" id="stampWarrior">✓</div>
      </div>
    </section>
  </main>

  <section class="modal" id="doorModal" aria-modal="true" role="dialog" aria-labelledby="doorTitle">
    <div class="door-box">
      <div class="door-head">
        <div>
          <h2 id="doorTitle">通關大門</h2>
          <p class="door-note">把憑證拖到正確凹槽。三個都放對，大門就會開啟。</p>
        </div>
        <button class="close-btn" id="closeDoor">關閉</button>
      </div>

      <div id="doorGame">
        <div class="slots" id="slots"></div>
        <div class="bag">
          <h3>背包欄</h3>
          <div class="badges" id="badges"></div>
        </div>
      </div>


      <div class="story-panel" id="storyPanel">
        <h2 class="story-title">探險家前進中</h2>
        <div class="story-stage">
          <div class="story-act" id="storyAct">第一幕：冒險門啟</div>
          <div class="story-image-frame"><img id="storyImage" src="ending-1.png" alt="結局過場圖"></div>
          <div class="story-line" id="storyLine">三枚憑證在門前亮起，像把一路走來的答案，輕輕交還給星光。</div>
        </div>
        <button class="story-next" id="storyNext">繼續</button>
      </div>

      <div class="win" id="winPanel">
        <h2>🏆 冒險完成！</h2>
        <p>總冒險時長</p>
        <div class="time" id="timeText">00 分 00 秒</div>
        <button class="again-btn" id="againBtn">再次冒險</button>
      </div>
    </div>
  </section>

  <script>
    const LEVELS = [
      { key: 'cert_dynasty', type: 'dynasty', label: '朝代', seal: '朝代之印', icon: '🎴', title: '朝代配對', href: '../示範1_朝代配對/index.html' },
      { key: 'cert_idiom', type: 'idiom', label: '成語', seal: '成語之印', icon: '📝', title: '成語填字', href: '../示範2_成語填字/index.html' },
      { key: 'cert_warrior', type: 'warrior', label: '勇者', seal: '勇者之印', icon: '⚔️', title: '打怪 RPG', href: '../示範3_打怪RPG/index.html' }
    ];

    const cover = document.getElementById('cover');
    const certCountEl = document.getElementById('certCount');
    const doorModal = document.getElementById('doorModal');
    const slotsEl = document.getElementById('slots');
    const badgesEl = document.getElementById('badges');
    const doorGame = document.getElementById('doorGame');
    const winPanel = document.getElementById('winPanel');
    const storyPanel = document.getElementById('storyPanel');
    const storyAct = document.getElementById('storyAct');
    const storyImage = document.getElementById('storyImage');
    const storyLine = document.getElementById('storyLine');
    const storyNext = document.getElementById('storyNext');
    const timeText = document.getElementById('timeText');
    let touchDrag = null;
    let storyIndex = 0;
    const STORY = [
      {
        act: '第一幕：冒險門啟',
        image: 'ending-1.png',
        line: '三枚憑證在門前亮起，像把一路走來的答案，輕輕交還給星光。'
      },
      {
        act: '第二幕：無窮天書',
        image: 'ending-2.png',
        line: '門後沒有終點，只有更遠的天空，等著新的問題慢慢發光。'
      },
      {
        act: '第三幕：星空入畫',
        image: 'ending-3.png',
        line: '「走過的路不會消失，它會變成下一次出發時，腳邊最溫柔的光。」'
      },
      {
        act: '第四幕：勇敢探索',
        image: 'ending-4.png',
        line: '清晨把空白留在地圖上，像一封還沒拆開的信。'
      }
    ];

    function syncCertsFromUrl() {
      const params = new URLSearchParams(location.search);
      let changed = false;
      ['cert_dynasty', 'cert_idiom', 'cert_warrior'].forEach(key => {
        if (params.get(key) === '1') {
          try { localStorage.setItem(key, '1'); } catch (error) {}
          changed = true;
        }
      });
      if (changed && history.replaceState) {
        history.replaceState(null, '', location.pathname);
      }
    }

    function ensureStartTime() {
      if (!localStorage.getItem('adventure_start')) localStorage.setItem('adventure_start', String(Date.now()));
    }

    function hasCert(level) {
      return localStorage.getItem(level.key) === '1';
    }

    function setupCover() {
      if (sessionStorage.getItem('adventure_cover_seen') === '1') {
        cover.classList.add('hidden');
        return;
      }
      cover.addEventListener('click', () => {
        sessionStorage.setItem('adventure_cover_seen', '1');
        cover.classList.add('hidden');
      }, { once: true });
    }

    function renderMap() {
      ensureStartTime();
      let count = 0;
      LEVELS.forEach(level => { if (hasCert(level)) count += 1; });
      certCountEl.textContent = '持有 ' + count + ' / 3';
      document.getElementById('stampDynasty').classList.toggle('show', localStorage.getItem('cert_dynasty') === '1');
      document.getElementById('stampIdiom').classList.toggle('show', localStorage.getItem('cert_idiom') === '1');
      document.getElementById('stampWarrior').classList.toggle('show', localStorage.getItem('cert_warrior') === '1');
    }

    function openDoor() {
      doorModal.classList.add('show');
      doorGame.style.display = '';
      winPanel.classList.remove('show');
      storyPanel.classList.remove('show', 'fade');
      renderDoorGame();
    }

    function renderDoorGame() {
      slotsEl.innerHTML = '';
      badgesEl.innerHTML = '';
      LEVELS.forEach(level => {
        const slot = document.createElement('div');
        slot.className = 'slot';
        slot.dataset.type = level.type;
        slot.innerHTML = '<div class="slot-label">' + level.label + '</div><div>等待憑證</div>';
        setupSlot(slot);
        slotsEl.appendChild(slot);
      });

      const held = LEVELS.filter(hasCert);
      if (!held.length) {
        badgesEl.innerHTML = '<div class="empty-bag">目前沒有憑證。先完成關卡，再回來試著開門。</div>';
      } else {
        held.forEach(level => badgesEl.appendChild(createBadge(level)));
      }
    }

    function createBadge(level) {
      const badge = document.createElement('div');
      badge.className = 'badge';
      badge.draggable = true;
      badge.dataset.type = level.type;
      badge.innerHTML = '<span>' + level.icon + '</span><span>' + level.seal + '</span>';
      badge.addEventListener('dragstart', event => {
        if (badge.classList.contains('placed')) return event.preventDefault();
        event.dataTransfer.setData('text/plain', level.type);
        event.dataTransfer.effectAllowed = 'move';
      });
      badge.addEventListener('pointerdown', event => beginTouchDrag(event, badge));
      return badge;
    }

    function setupSlot(slot) {
      slot.addEventListener('dragover', event => {
        event.preventDefault();
        if (!slot.classList.contains('correct')) slot.classList.add('over');
      });
      slot.addEventListener('dragleave', () => slot.classList.remove('over'));
      slot.addEventListener('drop', event => {
        event.preventDefault();
        slot.classList.remove('over');
        const type = event.dataTransfer.getData('text/plain');
        const badge = badgesEl.querySelector('.badge[data-type="' + type + '"]');
        tryPlace(badge, slot);
      });
    }

    function tryPlace(badge, slot) {
      if (!badge || !slot || slot.classList.contains('correct') || badge.classList.contains('placed')) return;
      if (badge.dataset.type === slot.dataset.type) {
        slot.classList.add('correct');
        slot.innerHTML = '';
        badge.classList.add('placed');
        badge.draggable = false;
        slot.appendChild(badge);
        checkDoorComplete();
      } else {
        slot.classList.remove('wrong');
        void slot.offsetWidth;
        slot.classList.add('wrong');
        setTimeout(() => slot.classList.remove('wrong'), 320);
      }
    }

    function checkDoorComplete() {
      if (slotsEl.querySelectorAll('.slot.correct').length === 3) {
        setTimeout(startStory, 400);
      }
    }

    function startStory() {
      doorGame.style.display = 'none';
      winPanel.classList.remove('show');
      storyIndex = 0;
      renderStory();
      storyPanel.classList.remove('fade');
      storyPanel.classList.add('show');
    }

    function renderStory() {
      const scene = STORY[storyIndex];
      storyAct.textContent = scene.act;
      storyImage.src = scene.image;
      storyLine.textContent = scene.line;
      storyNext.textContent = storyIndex === STORY.length - 1 ? '冒險完成' : '繼續';
    }

    function advanceStory() {
      if (storyIndex < STORY.length - 1) {
        storyIndex += 1;
        renderStory();
        return;
      }
      storyPanel.classList.add('fade');
      setTimeout(showWin, 520);
    }

    function showWin() {
      storyPanel.classList.remove('show', 'fade');
      doorGame.style.display = 'none';
      winPanel.classList.add('show');
      const start = Number(localStorage.getItem('adventure_start') || Date.now());
      const total = Math.max(0, Math.floor((Date.now() - start) / 1000));
      const mm = String(Math.floor(total / 60)).padStart(2, '0');
      const ss = String(total % 60).padStart(2, '0');
      timeText.textContent = mm + ' 分 ' + ss + ' 秒';
    }

    function clearProgress(options = { includeSession: false }) {
      ['cert_dynasty', 'cert_idiom', 'cert_warrior', 'adventure_start'].forEach(key => localStorage.removeItem(key));
      if (options.includeSession) sessionStorage.clear();
      ensureStartTime();
      renderMap();
      if (doorModal.classList.contains('show')) renderDoorGame();
    }

    function beginTouchDrag(event, badge) {
      if (event.pointerType === 'mouse' || badge.classList.contains('placed')) return;
      event.preventDefault();
      const ghost = badge.cloneNode(true);
      ghost.classList.add('ghost');
      document.body.appendChild(ghost);
      touchDrag = { badge, ghost, pointerId: event.pointerId };
      moveGhost(event.clientX, event.clientY);
      badge.style.opacity = '0.45';
    }

    document.addEventListener('pointermove', event => {
      if (!touchDrag || touchDrag.pointerId !== event.pointerId) return;
      event.preventDefault();
      moveGhost(event.clientX, event.clientY);
      document.querySelectorAll('.slot').forEach(slot => slot.classList.remove('over'));
      const slot = document.elementFromPoint(event.clientX, event.clientY)?.closest?.('.slot');
      if (slot && !slot.classList.contains('correct')) slot.classList.add('over');
    }, { passive: false });

    document.addEventListener('pointerup', event => {
      if (!touchDrag || touchDrag.pointerId !== event.pointerId) return;
      const { badge, ghost } = touchDrag;
      document.querySelectorAll('.slot').forEach(slot => slot.classList.remove('over'));
      const slot = document.elementFromPoint(event.clientX, event.clientY)?.closest?.('.slot');
      tryPlace(badge, slot);
      badge.style.opacity = '';
      ghost.remove();
      touchDrag = null;
    });

    function moveGhost(x, y) {
      if (!touchDrag) return;
      touchDrag.ghost.style.left = x + 'px';
      touchDrag.ghost.style.top = y + 'px';
    }

    document.getElementById('doorHotspot').addEventListener('click', openDoor);
    document.getElementById('closeDoor').addEventListener('click', () => doorModal.classList.remove('show'));
    document.getElementById('clearBtn').addEventListener('click', () => clearProgress({ includeSession: false }));
    storyNext.addEventListener('click', advanceStory);
    document.getElementById('againBtn').addEventListener('click', () => {
      clearProgress({ includeSession: true });
      doorModal.classList.remove('show');
      location.reload();
    });

    syncCertsFromUrl();
    setupCover();
    renderMap();
    if (new URLSearchParams(location.search).has('previewEnding')) {
      sessionStorage.setItem('adventure_cover_seen', '1');
      ['cert_dynasty', 'cert_idiom', 'cert_warrior'].forEach(key => localStorage.setItem(key, '1'));
      cover.classList.add('hidden');
      renderMap();
      setTimeout(() => {
        doorModal.classList.add('show');
        startStory();
      }, 120);
    }
    window.addEventListener('pageshow', renderMap);
    window.addEventListener('focus', renderMap);
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) renderMap();
    });
  </script>
</body>
</html>
